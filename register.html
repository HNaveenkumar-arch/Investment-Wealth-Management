<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Create Account - Stackly Wealth">
    <meta property="og:description"
        content="Join our premium wealth management platform and secure your financial future today.">
    <link rel="icon" type="image/png" href="./asset/logo_Favicon.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Create Account - Stackly Wealth Management</title>

    <style>
        :root {
            --navy-dark: #051024;
            --navy-light: #0a192f;
            --navy-deep: #020c1b;
            --aqua: #00e5ff;
            --aqua-hover: #5cffff;
            --text-white: #f8f9fa;
            --text-gray: #a8b2d1;
            --border-color: rgba(0, 229, 255, 0.2);
            --aqua-glow: 0 0 10px rgba(0, 229, 255, 0.3), 0 0 20px rgba(0, 229, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {

            background: linear-gradient(rgba(2, 12, 27, 0.75), rgba(2, 12, 27, 0.85)),
                url('./asset/q1.webp') center/cover no-repeat fixed;
            background-color: var(--navy-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .preloader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--navy-deep);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition:
                opacity 0.6s ease,
                visibility 0.6s ease;
        }

        .preloader-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .aqua-ring {
            position: absolute;
            top: -30px;
            width: 100px;
            height: 100px;
            border: 2px solid transparent;
            border-top-color: var(--aqua);
            border-right-color: var(--aqua);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .preloader-icon {
            font-size: 2.5rem;
            color: var(--aqua);
            margin-bottom: 40px;
            animation: pulse 2s ease-in-out infinite;
        }

        .preloader-text {
            font-family: "Orbitron", sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .preloader-subtext {
            font-size: 0.8rem;
            color: var(--aqua);
            letter-spacing: 1px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }
        }


        .back-home-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--aqua);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(10, 25, 47, 0.5);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeDown 0.8s ease-out forwards;
            animation-delay: 0.5s;
        }

        .back-home-btn:hover {
            background: var(--aqua);
            color: var(--navy-dark);
            box-shadow: var(--aqua-glow);
        }

        .back-home-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 3;
        }

        @keyframes fadeDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            max-width: 480px;
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 229, 255, 0.05);
            flex-direction: column;
            padding: 40px;
            margin-top: 50px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 138px;
            max-width: 100%;
        }

        .header-text {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            color: var(--text-white);
            margin-bottom: 5px;
            font-size: 24px;
        }

        p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .role-card {
            border: 1px solid var(--navy-light);
            background: rgba(5, 16, 36, 0.5);
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .role-card i {
            font-size: 28px;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .role-card h3 {
            margin-top: 10px;
            color: var(--text-gray);
            font-size: 15px;
            transition: 0.3s;
        }

        .role-card.active {
            border-color: var(--aqua);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: var(--aqua-glow);
        }

        .role-card.active i,
        .role-card.active h3 {
            color: var(--aqua);
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-white);
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--navy-dark);
            border: 1px solid rgba(168, 178, 209, 0.3);
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
            color: var(--text-white);
        }

        input:focus {
            border-color: var(--aqua);
            box-shadow: inset 0 0 5px rgba(0, 229, 255, 0.1), 0 0 8px rgba(0, 229, 255, 0.2);
        }

        input::placeholder {
            color: #4a5568;
        }

        .field-error {
            color: #ff4d4d;
            font-size: 12px;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        .input-error input {
            border-color: #ff4d4d;
        }

        .pwd-wrapper {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .eye-btn:hover {
            color: var(--aqua);
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--aqua);
            border: 2px solid var(--aqua);
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background: var(--aqua);
            color: var(--navy-dark);
            box-shadow: var(--aqua-glow);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        .social-login {
            text-align: center;
            margin-top: 25px;
        }

        .social-login p {
            color: var(--text-gray);
            font-size: 13px;
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 25%;
            height: 1px;
            background: rgba(168, 178, 209, 0.2);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            border-color: var(--aqua);
            color: var(--aqua);
            box-shadow: var(--aqua-glow);
            transform: translateY(-3px);
        }

        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .links a {
            color: var(--aqua);
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .links a:hover {
            text-shadow: var(--aqua-glow);
        }


        @media(max-width: 600px) {
            body {
                padding: 15px;
            }

            .back-home-btn {
                position: absolute;
                top: 15px;
                left: 15px;
                padding: 8px 12px;
                font-size: 13px;
                gap: 6px;
            }

            .back-home-btn svg {
                width: 16px;
                height: 16px;
            }

            .register-container {
                padding: 30px 20px;
                margin-top: 70px;

                margin-bottom: 20px;
            }

            h2 {
                font-size: 20px;
            }

            .social-login p::before,
            .social-login p::after {
                width: 20%;
            }
        }
    </style>
</head>

<body>

    <div class="preloader-overlay" id="preloader">
        <div class="preloader-content">
            <div class="aqua-ring"></div>
            <div class="preloader-icon">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="preloader-text">TECH WEALTH</div>
            <div class="preloader-subtext">Optimizing Assets...</div>
        </div>
    </div>

    <a href="index.html" class="back-home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to home
    </a>


    <div class="register-container">
        <div class="logo">
            <a href="index.html"><img src="./asset/aqualogo.webp" alt="Stackly Wealth Logo"></a>
        </div>

        <div class="header-text">
            <h2>Create Account</h2>
            <p>Join our premium wealth management platform</p>
        </div>

        <div class="role-selector">
            <div class="role-card active" id="reg-investor">
                <i class="fa-solid fa-chart-line"></i>
                <h3>Investor</h3>
            </div>
            <div class="role-card" id="reg-advisor">
                <i class="fa-solid fa-user-tie"></i>
                <h3>Advisor</h3>
            </div>
        </div>

        <form id="registerForm">
            <div class="input-group" id="nameGroup">
                <label>Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
                <div class="field-error" id="nameError">Full Name is required</div>
            </div>

            <div class="input-group" id="emailGroup">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="client@stacklywealth.com">
                <div class="field-error" id="emailError">Email is required</div>
            </div>

            <div class="input-group" id="pwdGroup">
                <label>Password</label>
                <div class="pwd-wrapper">
                    <input type="password" id="regPwd" placeholder="Create password (min 6 chars)">
                    <button type="button" class="eye-btn" id="toggleEye1">
                        <svg class="eyeIcon1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="pwdError">Password is required</div>
            </div>

            <div class="input-group" id="cpwdGroup">
                <label>Confirm Password</label>
                <div class="pwd-wrapper">
                    <input type="password" id="confirmPwd" placeholder="Confirm password">
                    <button type="button" class="eye-btn" id="toggleEye2">
                        <svg class="eyeIcon2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="cpwdError">Please confirm your password</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Create Investor Account</button>
        </form>

        <div class="social-login">
            <p>Or sign up with</p>
            <div class="social-icons">
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fa-brands fa-google"></i></button>
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fa-brands fa-apple"></i></button>
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fa-brands fa-linkedin-in"></i></button>
            </div>
        </div>

        <div class="links">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script>


        document.addEventListener("DOMContentLoaded", () => {


            const preloader = document.getElementById("preloader");
            const mainContent = document.getElementById("mainContent");


            window.addEventListener("load", () => {
                setTimeout(() => {
                    preloader.style.opacity = "0";
                    preloader.style.visibility = "hidden";

                    mainContent.classList.remove("app-hidden");
                    mainContent.classList.add("app-visible");
                }, 1500);
            });

        });
        let currentRole = 'investor';
        const investorCard = document.getElementById('reg-investor');
        const advisorCard = document.getElementById('reg-advisor');
        const submitBtn = document.getElementById('submitBtn');


        investorCard.addEventListener('click', () => {
            currentRole = 'investor';
            investorCard.classList.add('active');
            advisorCard.classList.remove('active');
            submitBtn.innerText = 'Create Investor Account';
        });

        advisorCard.addEventListener('click', () => {
            currentRole = 'advisor';
            advisorCard.classList.add('active');
            investorCard.classList.remove('active');
            submitBtn.innerText = 'Create Advisor Account';
        });


        const eyeOpenSVG = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        const eyeClosedSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path>`;

        const setupPasswordToggle = (toggleBtnId, inputId, iconClass) => {
            document.getElementById(toggleBtnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon = document.querySelector(`.${iconClass}`);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerHTML = eyeOpenSVG;
                } else {
                    input.type = 'password';
                    icon.innerHTML = eyeClosedSVG;
                }
            });
        };

        setupPasswordToggle('toggleEye1', 'regPwd', 'eyeIcon1');
        setupPasswordToggle('toggleEye2', 'confirmPwd', 'eyeIcon2');


        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const nameInput = document.getElementById('fullname');
            const emailInput = document.getElementById('regEmail');
            const pwdInput = document.getElementById('regPwd');
            const cpwdInput = document.getElementById('confirmPwd');

            const nameGroup = document.getElementById('nameGroup');
            const emailGroup = document.getElementById('emailGroup');
            const pwdGroup = document.getElementById('pwdGroup');
            const cpwdGroup = document.getElementById('cpwdGroup');

            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const pwdError = document.getElementById('pwdError');
            const cpwdError = document.getElementById('cpwdError');

            let isValid = true;
            const nameRegex = /^[A-Za-z\s]+$/;


            if (nameInput.value.trim() === '') {
                nameGroup.classList.add('input-error');
                nameError.innerText = 'Full Name is required';
                nameError.style.display = 'block';
                isValid = false;
            } else if (nameInput.value.trim().length < 3) {
                nameGroup.classList.add('input-error');
                nameError.innerText = 'Must be at least 3 characters long';
                nameError.style.display = 'block';
                isValid = false;
            } else if (!nameRegex.test(nameInput.value.trim())) {
                nameGroup.classList.add('input-error');
                nameError.innerText = 'Only alphabets and spaces allowed';
                nameError.style.display = 'block';
                isValid = false;
            }


            if (emailInput.value.trim() === '') {
                emailGroup.classList.add('input-error');
                emailError.innerText = 'Email is required';
                emailError.style.display = 'block';
                isValid = false;
            }


            if (pwdInput.value === '') {
                pwdGroup.classList.add('input-error');
                pwdError.innerText = 'Password is required';
                pwdError.style.display = 'block';
                isValid = false;
            } else if (pwdInput.value.length < 6) {
                pwdGroup.classList.add('input-error');
                pwdError.innerText = 'Password must be at least 6 characters';
                pwdError.style.display = 'block';
                isValid = false;
            }


            if (cpwdInput.value === '') {
                cpwdGroup.classList.add('input-error');
                cpwdError.innerText = 'Please confirm your password';
                cpwdError.style.display = 'block';
                isValid = false;
            } else if (pwdInput.value !== cpwdInput.value) {
                cpwdGroup.classList.add('input-error');
                cpwdError.innerText = 'Passwords do not match';
                cpwdError.style.display = 'block';
                isValid = false;
            }


            if (isValid) {
                submitBtn.innerText = 'Creating Account...';
                submitBtn.disabled = true;
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        });


        const clearError = (inputId, groupId, errorId) => {
            document.getElementById(inputId).addEventListener('input', function () {
                document.getElementById(groupId).classList.remove('input-error');
                document.getElementById(errorId).style.display = 'none';
            });
        }

        clearError('fullname', 'nameGroup', 'nameError');
        clearError('regEmail', 'emailGroup', 'emailError');
        clearError('regPwd', 'pwdGroup', 'pwdError');
        clearError('confirmPwd', 'cpwdGroup', 'cpwdError');

    </script>
</body>

</html>
