<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Stackly Wealth - Login">
    <meta property="og:description"
        content="Securely access your Investment Performance and Wealth Portfolio Dashboards.">
    <meta name="description"
        content="Login to Stackly Wealth Management to monitor your investment performance and manage portfolios.">
    <link rel="icon" type="image/png" href="./asset/logo_Favicon.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Login - Stackly Wealth Management</title>

    <style>
        :root {
             
            --navy-dark: #051024;
            --navy-light: #0a192f;
            --navy-deep: #020c1b;
            --aqua: #00e5ff;
            --aqua-hover: #5cffff;
            --text-white: #f8f9fa;
            --text-gray: #a8b2d1;
            --border-color: rgba(0, 229, 255, 0.2);
            --aqua-glow: 0 0 10px rgba(0, 229, 255, 0.3), 0 0 20px rgba(0, 229, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--navy-deep);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

         
        .back-home-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--aqua);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(10, 25, 47, 0.5);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeDown 0.8s ease-out forwards;
            animation-delay: 1s;
        }

        .back-home-btn:hover {
            background: var(--aqua);
            color: var(--navy-dark);
            box-shadow: var(--aqua-glow);
        }

        .back-home-btn svg {
            width: 18px;
            height: 18px;
        }

        @keyframes fadeDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

         
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .background-shapes li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--border-color);
            animation: floatUp 25s linear infinite;
            bottom: -150px;
            border-radius: 4px;
        }

        .background-shapes li:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }

        .background-shapes li:nth-child(2) {
            left: 10%;
            width: 20px;
            height: 20px;
            animation-delay: 2s;
            animation-duration: 12s;
        }

        .background-shapes li:nth-child(3) {
            left: 70%;
            width: 20px;
            height: 20px;
            animation-delay: 4s;
        }

        .background-shapes li:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .background-shapes li:nth-child(5) {
            left: 65%;
            width: 20px;
            height: 20px;
            animation-delay: 0s;
        }

        .background-shapes li:nth-child(6) {
            left: 75%;
            width: 110px;
            height: 110px;
            animation-delay: 3s;
        }

        .background-shapes li:nth-child(7) {
            left: 35%;
            width: 150px;
            height: 150px;
            animation-delay: 7s;
        }

        .background-shapes li:nth-child(8) {
            left: 50%;
            width: 25px;
            height: 25px;
            animation-delay: 15s;
            animation-duration: 45s;
        }

        .background-shapes li:nth-child(9) {
            left: 20%;
            width: 15px;
            height: 15px;
            animation-delay: 2s;
            animation-duration: 35s;
        }

        .background-shapes li:nth-child(10) {
            left: 85%;
            width: 150px;
            height: 150px;
            animation-delay: 0s;
            animation-duration: 11s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

         
        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            max-width: 450px;
            background: rgba(10, 25, 47, 0.85);
             
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 229, 255, 0.05);
            flex-direction: column;
            padding: 40px;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

         
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .logo-text span {
            color: var(--aqua);
        }

        .header-text {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            color: var(--text-white);
            margin-bottom: 5px;
            font-size: 24px;
        }

        p {
            color: var(--text-gray);
            font-size: 14px;
        }

         
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .role-card {
            border: 1px solid var(--navy-light);
            background: rgba(5, 16, 36, 0.5);
             
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .role-card i {
            font-size: 30px;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .role-card h3 {
            margin-top: 10px;
            color: var(--text-gray);
            font-size: 15px;
            transition: 0.3s;
        }

        .role-card.active {
            border-color: var(--aqua);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: var(--aqua-glow);
        }

        .role-card.active i,
        .role-card.active h3 {
            color: var(--aqua);
        }

         
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-white);
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--navy-dark);
            border: 1px solid rgba(168, 178, 209, 0.3);
             
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
            color: var(--text-white);
        }

        input:focus {
            border-color: var(--aqua);
            box-shadow: inset 0 0 5px rgba(0, 229, 255, 0.1), 0 0 8px rgba(0, 229, 255, 0.2);
        }

        input::placeholder {
            color: #4a5568;
        }

        .field-error {
            color: #ff4d4d;
            font-size: 12px;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        .pwd-wrapper {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .eye-btn:hover {
            color: var(--aqua);
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
        }

         
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            margin-top: -5px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 13px;
        }

        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--aqua);
        }

        .forgot-pwd {
            color: var(--aqua);
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-pwd:hover {
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

         
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--aqua);
            border: 2px solid var(--aqua);
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: var(--aqua);
            color: var(--navy-dark);
            box-shadow: var(--aqua-glow);
            transform: translateY(-2px);
        }

         
        .social-login {
            text-align: center;
            margin-top: 25px;
        }

        .social-login p {
            color: var(--text-gray);
            font-size: 13px;
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 25%;
            height: 1px;
            background: rgba(168, 178, 209, 0.2);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            border-color: var(--aqua);
            color: var(--aqua);
            box-shadow: var(--aqua-glow);
            transform: translateY(-3px);
        }

         
        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .links a {
            color: var(--aqua);
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        .logo img {
            width: 138px;
        }

         
        @media(max-width: 600px) {
            .back-home-btn {
                position: absolute;
                top: 15px;
                left: 15px;
                padding: 8px 15px;
                font-size: 13px;
            }

            .login-container {
                padding: 30px 20px;
                margin-top: 70px;
            }

            .role-selector {
                gap: 10px;
            }
        }
    </style>
</head>

<body>
      
    <ul class="background-shapes">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

      
    <a href="index.html" class="back-home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>

      
    <div class="login-container">

          
        <div class="logo">
            <a href="index.html"><img src="./asset/Logo blue.webp" alt=""></a>
        </div>

        <div class="header-text">
            <h2>Secure Portal Access</h2>
            <p>Enter your credentials to manage your wealth</p>
        </div>

          
        <div class="role-selector">
            <div class="role-card active" id="role-investor">
                <i class="fa-solid fa-chart-line"></i>
                <h3>Investor</h3>
            </div>

            <div class="role-card" id="role-advisor">
                <i class="fa-solid fa-user-tie"></i>
                <h3>Advisor</h3>
            </div>
        </div>

          
        <form id="loginForm">
            <div class="input-group" id="emailGroup">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="client@stacklywealth.com">
                <div class="field-error" id="emailError">Email is required</div>
            </div>

            <div class="input-group" id="pwdGroup">
                <label>Password</label>
                <div class="pwd-wrapper">
                    <input type="password" id="password" placeholder="••••••••">
                    <button type="button" class="eye-btn" id="toggleEye">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="pwdError">Password is required</div>
            </div>

            <div class="form-options">
                <label class="remember-me"><input type="checkbox"> Remember me</label>
                <a href="404page.html" class="forgot-pwd">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Login as Investor</button>
        </form>

        <div class="social-login">
            <p>Or access via secure portal</p>
            <div class="social-icons">
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fab fa-google"></i></button>
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fab fa-apple"></i></button>
                <button class="social-btn" onclick="window.location.href='404page.html'"><i
                        class="fab fa-linkedin-in"></i></button>
            </div>
        </div>

        <div class="links">
            <p>Want to start investing? <a href="register.html">Open an Account</a></p>
        </div>
    </div>

      
    <script>
        let currentRole = 'investor';
        const investorCard = document.getElementById('role-investor');
        const advisorCard = document.getElementById('role-advisor');
        const submitBtn = document.getElementById('submitBtn');

        // Role Switching Logic
        investorCard.addEventListener('click', () => {
            currentRole = 'investor';
            investorCard.classList.add('active');
            advisorCard.classList.remove('active');
            submitBtn.innerText = 'Login as Investor';
        });

        advisorCard.addEventListener('click', () => {
            currentRole = 'advisor';
            advisorCard.classList.add('active');
            investorCard.classList.remove('active');
            submitBtn.innerText = 'Login as Advisor';
        });

        // Password Visibility Toggle
        const toggleEye = document.getElementById('toggleEye');
        const pwdInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        const eyeOpenSVG = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        const eyeClosedSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path>`;

        toggleEye.addEventListener('click', () => {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerHTML = eyeOpenSVG;
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerHTML = eyeClosedSVG;
            }
        });

        // Form Validation & Redirection
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            const pwdError = document.getElementById('pwdError');

            let isValid = true;

            if (emailInput.value.trim() === '') {
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }

            if (pwdInput.value.trim() === '') {
                pwdError.innerText = 'Password is required';
                pwdError.style.display = 'block';
                isValid = false;
            } else if (pwdInput.value.trim().length < 6) {
                pwdError.innerText = 'Minimum 6 characters needed for security';
                pwdError.style.display = 'block';
                isValid = false;
            } else {
                pwdError.style.display = 'none';
            }

            // Redirect based on selected role
            if (isValid) {
                submitBtn.innerText = 'Authenticating...';
                submitBtn.style.opacity = '0.7';
                submitBtn.disabled = true;

                setTimeout(() => {
                    if (currentRole === 'investor') {
                        // Dashboard 1: Investment Performance Dashboard
                        window.location.href = 'dashboard1.html';
                    } else if (currentRole === 'advisor') {
                        // Dashboard 2: Wealth Portfolio Overview
                        window.location.href = 'dashboard2.html';
                    }
                }, 1000);
            }
        });
    </script>
</body>

</html>
