<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Stackly Wealth - The investment asset or page you are looking for is missing.">

    <title>404 - Asset Not Found | Stackly Wealth</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
             
            --navy-dark: #051024;
            --navy-light: #0a192f;
            --navy-deep: #020c1b;
            --aqua: #00e5ff;
            --aqua-hover: #5cffff;
            --text-white: #f8f9fa;
            --text-gray: #a8b2d1;
            --border-color: rgba(0, 229, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--navy-deep);
            font-family: 'Inter', sans-serif;
            color: var(--text-white);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

         
        .error-bg-glow {
            position: absolute;
            width: 150vw;
            height: 150vw;
            max-width: 1200px;
            max-height: 1200px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: pulseAquaGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseAquaGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.6;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

         
        .scrolling-grid {
            position: absolute;
            top: 10%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.15) 2px, transparent 2px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            transform: rotateX(70deg);
            animation: infiniteGridScroll 20s linear infinite;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
        }

        @keyframes infiniteGridScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 500px;
            }
        }

         
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
            width: 90%;
            max-width: 600px;

             
            background: linear-gradient(rgba(5, 16, 36, 0.85), rgba(10, 25, 47, 0.95)),
                url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800&q=80') center/cover no-repeat;

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 229, 255, 0.1);
            transition: transform 0.1s ease-out;
            overflow: hidden;
        }

         
        .status-badge {
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--aqua);
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .status-badge i {
            animation: radarPing 2s infinite;
        }

        @keyframes radarPing {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

         
        .error-code-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 9rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-white);
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5), 8px 8px 20px rgba(0, 229, 255, 0.4);
            animation: floatingText 6s ease-in-out infinite;
        }

         
        .flying-icon {
            position: absolute;
            top: -20px;
            right: -30px;
            font-size: 2.5rem;
            color: var(--aqua);
            animation: flyAround 8s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.5));
            z-index: 15;
        }

        @keyframes floatingText {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes flyAround {
            0% {
                transform: translate(0, 0) rotate(15deg) scale(1);
            }

            25% {
                transform: translate(20px, -20px) rotate(25deg) scale(1.1);
            }

            50% {
                transform: translate(0px, -40px) rotate(15deg) scale(1);
            }

            75% {
                transform: translate(-20px, -20px) rotate(5deg) scale(0.9);
            }

            100% {
                transform: translate(0, 0) rotate(15deg) scale(1);
            }
        }

        .error-desc {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

         
        .error-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-base {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex: 1;
            min-width: 160px;
        }

        .btn-primary {
            background: rgba(0, 229, 255, 0.1);
            color: var(--aqua);
            border: 2px solid var(--aqua);
            box-shadow: 0 8px 20px rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            background: var(--aqua);
            color: var(--navy-dark);
            box-shadow: 0 12px 25px rgba(0, 229, 255, 0.3);
        }

        .btn-primary:hover i {
            transform: translateX(-5px);
        }

        .btn-outline {
            background: rgba(10, 25, 47, 0.6);
            color: var(--text-white);
            border: 2px solid rgba(168, 178, 209, 0.3);
            backdrop-filter: blur(5px);
        }

        .btn-outline:hover {
            transform: translateY(-4px);
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--aqua);
            color: var(--aqua);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-outline:hover i {
            transform: scale(1.1);
        }

        .btn-base i {
            transition: transform 0.3s ease;
        }

         
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .flying-icon {
                font-size: 2rem;
                top: -15px;
                right: -15px;
            }

            .error-container {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 35px 20px;
                border-radius: 24px;
            }

            .error-code {
                font-size: 5rem;
            }

            .flying-icon {
                font-size: 1.5rem;
                top: -10px;
                right: -10px;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 6px 14px;
                margin-bottom: 15px;
            }

            .error-desc {
                font-size: 0.95rem;
                margin-bottom: 25px;
            }

            .error-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn-base {
                width: 100%;
                padding: 14px 20px;
                min-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="error-bg-glow" id="aquaGlow"></div>
    <div class="scrolling-grid"></div>

    <div class="error-container" id="errorContainer">

        <div class="status-badge"><i class="fa-solid fa-triangle-exclamation"></i> Asset Not Found</div>

        <div class="error-code-wrapper">
            <h1 class="error-code">404</h1>
            <i class="fa-solid fa-coins flying-icon"></i>
        </div>

        <p class="error-desc">Oops! The financial asset, portfolio, or page you are looking for has been liquidated or
            does not exist on our servers.</p>

        <div class="error-actions">
            <a href="javascript:history.back()" class="btn-base btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
            <a href="index.html" class="btn-base btn-outline">
                <i class="fa-solid fa-house"></i> Return Home
            </a>
        </div>

    </div>

    <script>
        const container = document.getElementById('errorContainer');
        const glow = document.getElementById('aquaGlow');

        // 3D Parallax Effect on Mouse Move
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const halfW = window.innerWidth / 2;
                const halfH = window.innerHeight / 2;

                const xVal = (halfW - e.pageX) / 60;
                const yVal = (halfH - e.pageY) / 60;

                container.style.transform = `rotateY(${xVal * -1}deg) rotateX(${yVal}deg) translateY(-5px)`;
                glow.style.transform = `translate(${-50 + xVal * 0.5}%, ${-50 + yVal * 0.5}%) scale(1)`;
            }
        });

        // Reset on Mouse Leave
        document.addEventListener('mouseleave', () => {
            if (window.innerWidth > 768) {
                container.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0)`;
                glow.style.transform = `translate(-50%, -50%) scale(1)`;
            }
        });
    </script>

</body>

</html>
